<html lang="en">
<head>

<title>Bhoomi CMS Admin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --header-bg: #0E2E0E;
    --sidebar-bg: #1A4A1A;
    --sidebar-hover: #255225;
    --sidebar-active: #2E6B2E;
    --accent: #D4AC0D;
    --accent-hover: #B8960B;
    --content-bg: #f8f9fa;
    --white: #ffffff;
    --text-dark: #1a1a1a;
    --text-muted: #6c757d;
    --border: #dee2e6;
    --danger: #dc3545;
    --success: #28a745;
    --warning: #ffc107;
    --badge-snacks: #fd7e14;
    --badge-teas: #0d6efd;
    --badge-wellness: #198754;
    --badge-grains: #795548;
    --badge-beauty: #6f42c1;
    --shadow: 0 2px 8px rgba(0,0,0,0.12);
    --radius: 8px;
    --sidebar-width: 220px;
    --header-height: 60px;
  }

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--content-bg); color: var(--text-dark); height: 100vh; overflow: hidden; }

  /* ── LOGIN ── */
  #login-screen {
    position: fixed; inset: 0; background: linear-gradient(135deg, #0E2E0E 0%, #1A4A1A 50%, #0E2E0E 100%);
    display: flex; align-items: center; justify-content: center; z-index: 1000;
  }
  #login-screen.hidden { display: none; }
  .login-box {
    background: var(--white); border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4); text-align: center;
  }
  .login-logo { font-size: 48px; margin-bottom: 8px; }
  .login-title { font-size: 24px; font-weight: 700; color: var(--header-bg); margin-bottom: 4px; }
  .login-sub { color: var(--text-muted); font-size: 14px; margin-bottom: 32px; }
  .login-box input {
    width: 100%; padding: 12px 16px; border: 2px solid var(--border); border-radius: var(--radius);
    font-size: 16px; outline: none; transition: border-color 0.2s; margin-bottom: 16px;
  }
  .login-box input:focus { border-color: var(--accent); }
  .login-btn {
    width: 100%; padding: 13px; background: var(--header-bg); color: var(--white);
    border: none; border-radius: var(--radius); font-size: 16px; font-weight: 600;
    cursor: pointer; transition: background 0.2s;
  }
  .login-btn:hover { background: var(--sidebar-active); }
  .login-error { color: var(--danger); font-size: 14px; margin-top: 12px; min-height: 20px; }

  /* ── LAYOUT ── */
  #app { display: flex; flex-direction: column; height: 100vh; }
  #app.hidden { display: none; }

  /* Header */
  #header {
    background: var(--header-bg); color: var(--white); height: var(--header-height);
    display: flex; align-items: center; padding: 0 24px; gap: 16px;
    position: fixed; top: 0; left: 0; right: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .header-brand { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 700; flex: 1; }
  .header-brand span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .header-user { font-size: 13px; color: #9dc99d; }
  #save-status {
    font-size: 12px; padding: 4px 10px; border-radius: 20px;
    background: rgba(212,172,13,0.2); color: var(--accent);
    transition: opacity 0.5s; font-weight: 600;
  }
  #save-status.hidden { opacity: 0; }
  .btn-logout {
    padding: 7px 16px; background: rgba(255,255,255,0.1); color: var(--white);
    border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; font-size: 13px;
    cursor: pointer; transition: background 0.2s;
  }
  .btn-logout:hover { background: rgba(255,255,255,0.2); }

  /* Sidebar + Content wrapper */
  #main-wrapper { display: flex; margin-top: var(--header-height); height: calc(100vh - var(--header-height)); }

  #sidebar {
    width: var(--sidebar-width); background: var(--sidebar-bg); color: var(--white);
    flex-shrink: 0; overflow-y: auto; padding: 16px 0;
  }
  .nav-item {
    display: flex; align-items: center; gap: 12px; padding: 12px 20px;
    cursor: pointer; font-size: 14px; font-weight: 500; color: #9dc99d;
    transition: all 0.2s; border-left: 3px solid transparent;
  }
  .nav-item:hover { background: var(--sidebar-hover); color: var(--white); }
  .nav-item.active { background: var(--sidebar-active); color: var(--white); border-left-color: var(--accent); }
  .nav-icon { font-size: 18px; width: 24px; text-align: center; }

  #content { flex: 1; overflow-y: auto; padding: 32px; }

  /* ── CARDS ── */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .stat-card {
    background: var(--white); border-radius: var(--radius); padding: 24px;
    box-shadow: var(--shadow); border-top: 4px solid var(--accent);
  }
  .stat-card .stat-val { font-size: 36px; font-weight: 700; color: var(--header-bg); line-height: 1; margin-bottom: 6px; }
  .stat-card .stat-lbl { font-size: 13px; color: var(--text-muted); font-weight: 500; }

  .page-title { font-size: 22px; font-weight: 700; color: var(--header-bg); margin-bottom: 6px; }
  .page-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px;
    border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer;
    border: none; transition: all 0.2s; text-decoration: none;
  }
  .btn-primary { background: var(--header-bg); color: var(--white); }
  .btn-primary:hover { background: var(--sidebar-active); }
  .btn-accent { background: var(--accent); color: var(--white); }
  .btn-accent:hover { background: var(--accent-hover); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-danger { background: var(--danger); color: var(--white); }
  .btn-danger:hover { background: #b02a37; }
  .btn-outline { background: transparent; color: var(--header-bg); border: 1px solid var(--border); }
  .btn-outline:hover { background: var(--content-bg); }
  .btn-success { background: var(--success); color: var(--white); }
  .btn-success:hover { background: #1e7e34; }

  /* ── TABLE ── */
  .table-container { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .table-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: gap; gap: 12px; }
  table { width: 100%; border-collapse: collapse; }
  thead th { background: #f0f4f0; padding: 12px 16px; text-align: left; font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f8fff8; }
  tbody td { padding: 12px 16px; font-size: 14px; vertical-align: middle; }

  /* ── BADGES ── */
  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px;
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .badge-snacks { background: #fff0e0; color: var(--badge-snacks); }
  .badge-teas { background: #e7f0ff; color: var(--badge-teas); }
  .badge-wellness { background: #e8f5e9; color: var(--badge-wellness); }
  .badge-grains { background: #f3ede8; color: var(--badge-grains); }
  .badge-beauty { background: #f0eaff; color: var(--badge-beauty); }

  /* ── TOGGLE ── */
  .toggle { position: relative; display: inline-block; width: 40px; height: 22px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
    background: #ccc; border-radius: 22px; transition: 0.3s;
  }
  .toggle-slider:before {
    position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px;
    background: white; border-radius: 50%; transition: 0.3s;
  }
  input:checked + .toggle-slider { background: var(--success); }
  input:checked + .toggle-slider:before { transform: translateX(18px); }

  /* ── FILTER TABS ── */
  .filter-tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-tab {
    padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
    cursor: pointer; border: 2px solid var(--border); background: var(--white); color: var(--text-muted);
    transition: all 0.2s;
  }
  .filter-tab.active { border-color: var(--header-bg); background: var(--header-bg); color: var(--white); }

  /* ── PILLS TABS ── */
  .pill-tabs { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 2px solid var(--border); padding-bottom: 0; }
  .pill-tab {
    padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer;
    color: var(--text-muted); border-bottom: 3px solid transparent; margin-bottom: -2px;
    transition: all 0.2s;
  }
  .pill-tab:hover { color: var(--header-bg); }
  .pill-tab.active { color: var(--header-bg); border-bottom-color: var(--accent); }

  /* ── FORMS ── */
  .form-section { background: var(--white); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); margin-bottom: 20px; }
  .form-section h3 { font-size: 15px; font-weight: 700; color: var(--header-bg); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 13px; font-weight: 600; color: var(--text-dark); }
  .form-group input, .form-group textarea, .form-group select {
    padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 6px;
    font-size: 14px; outline: none; transition: border-color 0.2s; font-family: inherit;
    background: var(--white);
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-full { grid-column: 1 / -1; }

  /* ── MODAL ── */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-backdrop.hidden { display: none; }
  .modal-box {
    background: var(--white); border-radius: 12px; width: 100%; max-width: 560px;
    max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .modal-header {
    padding: 20px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--white); z-index: 1;
  }
  .modal-header h2 { font-size: 18px; font-weight: 700; color: var(--header-bg); }
  .modal-close { font-size: 22px; cursor: pointer; color: var(--text-muted); line-height: 1; border: none; background: none; padding: 4px; }
  .modal-close:hover { color: var(--danger); }
  .modal-body { padding: 24px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

  /* ── EVENTS ── */
  .events-list { display: flex; flex-direction: column; gap: 12px; }
  .event-card {
    background: var(--white); border-radius: var(--radius); padding: 20px;
    box-shadow: var(--shadow); display: flex; align-items: flex-start; gap: 16px;
  }
  .event-date-box {
    background: var(--header-bg); color: var(--white); border-radius: 8px;
    padding: 10px 14px; text-align: center; flex-shrink: 0; min-width: 64px;
  }
  .event-date-box .day { font-size: 20px; font-weight: 800; line-height: 1; }
  .event-date-box .month { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; color: var(--accent); }
  .event-info { flex: 1; }
  .event-info h4 { font-size: 16px; font-weight: 700; color: var(--header-bg); margin-bottom: 4px; }
  .event-info p { font-size: 13px; color: var(--text-muted); margin-bottom: 4px; }
  .event-location { font-size: 12px; color: var(--sidebar-active); font-weight: 600; }
  .event-actions { display: flex; gap: 8px; align-items: flex-start; }

  /* ── PILLS MANAGER ── */
  .pills-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .pill-item {
    display: flex; align-items: center; gap: 10px; background: #f0f4f0;
    border-radius: 6px; padding: 8px 12px;
  }
  .pill-item span { flex: 1; font-size: 14px; }
  .btn-icon { background: none; border: none; cursor: pointer; font-size: 16px; padding: 2px 6px; border-radius: 4px; }
  .btn-icon:hover { background: rgba(0,0,0,0.08); }
  .btn-icon.danger:hover { background: rgba(220,53,69,0.1); color: var(--danger); }

  /* Marquee list */
  .marquee-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .marquee-item {
    display: flex; align-items: center; gap: 10px;
    background: var(--white); border: 1.5px solid var(--border); border-radius: 6px; padding: 8px 12px;
  }
  .marquee-item span { flex: 1; font-size: 14px; }

  /* Cards editor */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
  .card-editor { background: #f8fff8; border: 1.5px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .card-editor .card-num { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; }

  /* Settings */
  .settings-panel { background: var(--white); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); margin-bottom: 20px; }
  .settings-panel h3 { font-size: 15px; font-weight: 700; color: var(--header-bg); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .info-panel { background: #e8f5e9; border: 1px solid #c8e6c9; border-radius: var(--radius); padding: 16px; font-size: 13px; line-height: 1.7; }
  .info-panel h4 { color: var(--header-bg); font-size: 14px; margin-bottom: 8px; }
  .info-panel ol, .info-panel ul { padding-left: 20px; }

  /* Dashboard quick links */
  .quick-links { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-top: 24px; }
  .quick-link {
    background: var(--white); border-radius: var(--radius); padding: 20px;
    box-shadow: var(--shadow); cursor: pointer; transition: all 0.2s;
    border: 2px solid transparent; text-align: center;
  }
  .quick-link:hover { border-color: var(--accent); transform: translateY(-2px); }
  .quick-link .ql-icon { font-size: 32px; margin-bottom: 8px; }
  .quick-link .ql-title { font-size: 14px; font-weight: 700; color: var(--header-bg); }
  .quick-link .ql-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .last-saved { font-size: 12px; color: var(--text-muted); margin-top: 8px; }

  /* Add item row */
  .add-item-row { display: flex; gap: 8px; align-items: center; }
  .add-item-row input { flex: 1; padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 14px; outline: none; }
  .add-item-row input:focus { border-color: var(--accent); }

  /* Responsive */
  @media (max-width: 768px) {
    #sidebar { width: 60px; }
    .nav-item span { display: none; }
    #content { padding: 16px; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }

  /* Hidden utility */
  .hidden { display: none !important; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Section content placeholder */
  #section-content { min-height: 200px; }

  /* Product name in table */
  .prod-name { font-weight: 600; color: var(--text-dark); }
  .prod-sub { font-size: 12px; color: var(--text-muted); }

  /* Danger zone */
  .danger-zone { border: 2px solid var(--danger); border-radius: var(--radius); padding: 16px; }
  .danger-zone h4 { color: var(--danger); margin-bottom: 8px; }
  .danger-zone p { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }
</style>
</head>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🌱</div>
    <div class="login-title">Bhoomi CMS</div>
    <div class="login-sub">FarmFresh Organics Admin Panel</div>
    <input type="password" id="login-pw" placeholder="Enter admin password" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <!-- Header -->
  <header id="header">
    <div class="header-brand">🌱 <span>Bhoomi</span> CMS &nbsp;<small style="font-weight:400;font-size:14px;color:#9dc99d;">FarmFresh Organics</small></div>
    <div class="header-right">
      <div id="save-status" class="hidden">Saved ✓</div>
      <span class="header-user">Logged in as Admin</span>
      <button class="btn-logout" onclick="doLogout()">Logout</button>
    </div>
  </header>

  <!-- Main Wrapper -->
  <div id="main-wrapper">
    <!-- Sidebar -->
    <nav id="sidebar">
      <div class="nav-item active" data-section="dashboard" onclick="navigate('dashboard')">
        <span class="nav-icon">📊</span><span>Dashboard</span>
      </div>
      <div class="nav-item" data-section="products" onclick="navigate('products')">
        <span class="nav-icon">🛒</span><span>Products</span>
      </div>
      <div class="nav-item" data-section="events" onclick="navigate('events')">
        <span class="nav-icon">📅</span><span>Events</span>
      </div>
      <div class="nav-item" data-section="discounts" onclick="navigate('discounts')">
        <span class="nav-icon">🏷️</span><span>Discounts</span>
      </div>
      <div class="nav-item" data-section="content" onclick="navigate('content')">
        <span class="nav-icon">✏️</span><span>Content</span>
      </div>
      <div class="nav-item" data-section="settings" onclick="navigate('settings')">
        <span class="nav-icon">⚙️</span><span>Settings</span>
      </div>
    </nav>

    <!-- Content -->
    <main id="content">
      <div id="section-content"></div>
    </main>
  </div>
</div>

<!-- MODAL -->
<div class="modal-backdrop hidden" id="modal-backdrop" onclick="handleBackdropClick(event)">
  <div class="modal-box" id="modal-box">
    <div class="modal-header">
      <h2 id="modal-title">Modal</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

// ─── AUTH ──────────────────────────────────────────────────────────────────
function getStoredPw() {
  const stored = localStorage.getItem('bhoomi_admin_pw');
  if (!stored) return btoa('bhoomi2024');
  return stored;
}

function doLogin() {
  const pw = document.getElementById('login-pw').value;
  const stored = getStoredPw();
  if (btoa(pw) === stored) {
    sessionStorage.setItem('bhoomi_admin_auth', '1');
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    loadData();
    navigate('dashboard');
  } else {
    document.getElementById('login-error').textContent = 'Incorrect password. Please try again.';
    document.getElementById('login-pw').value = '';
    document.getElementById('login-pw').focus();
  }
}

function doLogout() {
  sessionStorage.removeItem('bhoomi_admin_auth');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('login-pw').value = '';
  document.getElementById('login-error').textContent = '';
}

document.getElementById('login-pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// ─── DATA ──────────────────────────────────────────────────────────────────
function loadData() {
  const raw = localStorage.getItem('bhoomi_cms');
  if (raw) {
    try { cmsData = JSON.parse(raw); } catch { cmsData = deepClone(DEFAULT_DATA); }
    // Merge any missing keys from defaults
    cmsData = deepMerge(deepClone(DEFAULT_DATA), cmsData);
  } else {
    cmsData = deepClone(DEFAULT_DATA);
  }
  migrateData();
}

function migrateData() {
  if (!Array.isArray(cmsData.discounts)) {
    cmsData.discounts = [{ code: "BHOOMI10", percent: 10 }];
  }
  if (typeof cmsData.freeShippingThreshold !== 'number') {
    cmsData.freeShippingThreshold = 50;
  }
  if (!cmsData.sale || typeof cmsData.sale !== 'object') {
    cmsData.sale = {
      enabled: true,
      text: "🎉 GRAND OPENING SALE — Use code BHOOMI10 for 10% off · Free shipping on orders over $50!"
    };
  }
  if (typeof cmsData.sale.enabled !== 'boolean') cmsData.sale.enabled = true;
  if (typeof cmsData.sale.text !== 'string') {
    cmsData.sale.text = "🎉 GRAND OPENING SALE — Use code BHOOMI10 for 10% off · Free shipping on orders over $50!";
  }
  cmsData.products.forEach(p => {
    if (typeof p.image !== 'string') p.image = '';
    if (typeof p.desc !== 'string') p.desc = '';
  });
}

function saveData() {
  localStorage.setItem('bhoomi_cms', JSON.stringify(cmsData));
  showSaveStatus();
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveData, 500);
}

function showSaveStatus() {
  const el = document.getElementById('save-status');
  el.classList.remove('hidden');
  el.textContent = 'Saved ✓';
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.add('hidden'), 2500);
}

function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }

function deepMerge(target, source) {
  for (const key in source) {
    if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])) {
      if (!target[key] || typeof target[key] !== 'object') target[key] = {};
      deepMerge(target[key], source[key]);
    } else {
      target[key] = source[key];
    }
  }
  return target;
}

function getLastSaved() {
  const raw = localStorage.getItem('bhoomi_cms');
  if (!raw) return 'Never';
  // We can't store timestamp without modifying the schema, so just say "data exists"
  return 'Data loaded from localStorage';
}

// ─── NAVIGATION ────────────────────────────────────────────────────────────
function navigate(section) {
  currentSection = section;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.section === section);
  });
  renderSection(section);
}

function renderSection(name) {
  const el = document.getElementById('section-content');
  switch(name) {
    case 'dashboard': el.innerHTML = renderDashboard(); break;
    case 'products':  el.innerHTML = renderProducts(); break;
    case 'events':    el.innerHTML = renderEvents(); break;
    case 'discounts': el.innerHTML = renderDiscounts(); break;
    case 'content':   el.innerHTML = renderContent(); activateContentTab(currentContentTab); break;
    case 'settings':  el.innerHTML = renderSettings(); break;
  }
}

function renderProducts() {
  const cats = ['all','snacks','teas','wellness','grains','beauty'];
  const filtered = currentProductFilter === 'all'
    ? cmsData.products
    : cmsData.products.filter(p => p.cat === currentProductFilter);

  cats.forEach(c => catCounts[c] = c === 'all' ? cmsData.products.length : cmsData.products.filter(p=>p.cat===c).length);

  const filterTabsHtml = cats.map(c => `
    <div class="filter-tab ${currentProductFilter===c?'active':''}" onclick="setProductFilter('${c}')">
      ${c.charAt(0).toUpperCase()+c.slice(1)} <small>(${catCounts[c]})</small>
    </div>
  `).join('');

  const rowsHtml = filtered.map((p, idx) => {
    const realIdx = cmsData.products.indexOf(p);
    const descPreview = p.desc ? esc(p.desc.length > 50 ? p.desc.slice(0, 50) + '…' : p.desc) : '';
    const thumb = p.image
      ? `<img src="${esc(p.image)}" alt="" style="width:36px;height:36px;object-fit:cover;border-radius:6px;border:1px solid var(--border);flex-shrink:0">`
      : `<span style="font-size:24px;width:36px;text-align:center;flex-shrink:0">📦</span>`;
    return `
    <tr>
      <td>
        <div style="display:flex;align-items:center;gap:10px">
          ${thumb}
          <div>
            <div class="prod-name">${esc(p.name)}</div>
            <div class="prod-sub">${esc(p.sub)}</div>
            ${descPreview ? `<div class="prod-sub" style="font-style:italic">${descPreview}</div>` : ''}
          </div>
        </div>
      </td>
      <td>$${parseFloat(p.price).toFixed(2)}</td>
      <td><span class="badge badge-${p.cat}">${p.cat}</span></td>
      <td>
        <label class="toggle">
          <input type="checkbox" ${p.inStock?'checked':''} onchange="toggleStock(${realIdx}, this.checked)">
          <span class="toggle-slider"></span>
        </label>
      </td>
      <td>
        <button class="btn btn-outline btn-sm" onclick="openEditProduct(${realIdx})" title="Edit">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="deleteProduct(${realIdx})" title="Delete">🗑️</button>
      </td>
    </tr>`;
  }).join('');

  return `
  <div class="page-title">Products</div>
  <div class="page-sub">Manage your product catalog. ${cmsData.products.length} products total.</div>

  <div class="filter-tabs">${filterTabsHtml}</div>

  <div class="table-container">
    <div class="table-header">
      <span style="font-weight:700;font-size:14px;color:var(--header-bg)">
        ${filtered.length} product${filtered.length!==1?'s':''}${currentProductFilter!=='all'?' in '+currentProductFilter:''}
      </span>
      <button class="btn btn-primary" onclick="openAddProduct()">+ Add Product</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>Name / Description</th>
          <th>Price</th>
          <th>Category</th>
          <th>In Stock</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>${rowsHtml.length ? rowsHtml : '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:40px">No products found.</td></tr>'}</tbody>
    </table>
  </div>`;
}

function updateProductImagePreview(src) {
  const preview = document.getElementById('pm-image-preview');

    preview.style.display = '';

  }

function handleProductImageUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('pm-image-url').value = e.target.result;
    updateProductImagePreview(e.target.result);
  };
  reader.readAsDataURL(file);
}

function removeProductImage() {
  document.getElementById('pm-image-url').value = '';
  document.getElementById('pm-image-file').value = '';
  updateProductImagePreview('');
}

  const prod = { name, sub, price, cat, inStock, image, desc };

function updateFreeShippingThreshold(val) {
  cmsData.freeShippingThreshold = parseFloat(val) || 0;
  scheduleSave();
}

function openAddDiscount() {
  editingDiscountIdx = -1;
  showDiscountModal({ code: '', percent: 10 });
}

function openEditDiscount(idx) {
  editingDiscountIdx = idx;
  showDiscountModal(cmsData.discounts[idx]);
}

function showDiscountModal(d) {
  document.getElementById('modal-title').textContent = editingDiscountIdx === -1 ? 'Add Discount' : 'Edit Discount';
  document.getElementById('modal-body').innerHTML = `
    <div class="form-grid">
      <div class="form-group">
        <label>Code</label>
        <input type="text" id="dm-code" value="${esc(d.code)}" placeholder="e.g. BHOOMI10" style="text-transform:uppercase">
      </div>
      <div class="form-group">
        <label>Percent off (1-100)</label>
        <input type="number" id="dm-percent" value="${d.percent}" min="1" max="100" step="1" placeholder="10">
      </div>
    </div>
  `;
  document.getElementById('modal-footer').innerHTML = `
    <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="saveDiscount()">Save Discount</button>
  `;
  openModal();
}

function saveDiscount() {
  const code = document.getElementById('dm-code').value.trim().toUpperCase();
  const percent = parseInt(document.getElementById('dm-percent').value, 10);

  if (!code) { alert('Discount code is required.'); return; }
  if (!percent || percent < 1 || percent > 100) { alert('Percent off must be between 1 and 100.'); return; }

  const disc = { code, percent };
  if (editingDiscountIdx === -1) {
    cmsData.discounts.push(disc);
  } else {
    cmsData.discounts[editingDiscountIdx] = disc;
  }
  saveData();
  closeModal();
  navigate('discounts');
}

function deleteDiscount(idx) {
  if (confirm(`Delete discount code "${cmsData.discounts[idx].code}"?`)) {
    cmsData.discounts.splice(idx, 1);
    saveData();
    navigate('discounts');
  }
}

function changePassword() {
  const cur = document.getElementById('pw-current').value;
  const nw = document.getElementById('pw-new').value;
  const conf = document.getElementById('pw-confirm').value;
  const msg = document.getElementById('pw-msg');

  if (btoa(cur) !== getStoredPw()) {
    msg.style.color = 'var(--danger)';
    msg.textContent = 'Current password is incorrect.';
    return;
  }
  if (!nw || nw.length < 6) {
    msg.style.color = 'var(--danger)';
    msg.textContent = 'New password must be at least 6 characters.';
    return;
  }
  if (nw !== conf) {
    msg.style.color = 'var(--danger)';
    msg.textContent = 'New passwords do not match.';
    return;
  }
  localStorage.setItem('bhoomi_admin_pw', btoa(nw));
  msg.style.color = 'var(--success)';
  msg.textContent = 'Password updated successfully!';
  document.getElementById('pw-current').value = '';
  document.getElementById('pw-new').value = '';
  document.getElementById('pw-confirm').value = '';
}

function exportData() {
  const json = JSON.stringify(cmsData, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'bhoomi_data.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const msg = document.getElementById('import-msg');
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!parsed.products || !parsed.hero) {
        msg.style.color = 'var(--danger)';
        msg.textContent = 'Invalid data format. Please use a file exported from this CMS.';
        return;
      }
      cmsData = parsed;
      migrateData();
      saveData();
      msg.style.color = 'var(--success)';
      msg.textContent = 'Data imported successfully! Navigate to any section to see changes.';
    } catch {
      msg.style.color = 'var(--danger)';
      msg.textContent = 'Failed to parse JSON file. Please check the file is valid.';
    }
  };
  reader.readAsText(file);
}

function resetToDefaults() {
  if (confirm('Are you sure you want to reset ALL data to defaults? This cannot be undone.')) {
    if (confirm('Last chance: this will permanently erase all your customizations. Continue?')) {
      cmsData = deepClone(DEFAULT_DATA);
      saveData();
      navigate(currentSection);
      alert('Data has been reset to defaults.');
    }
  }
}

}

function handleBackdropClick(e) {
  if (e.target === document.getElementById('modal-backdrop')) closeModal();
}

// ─── UTILS ─────────────────────────────────────────────────────────────────
function esc(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#x27;');
}

// ─── INIT ──────────────────────────────────────────────────────────────────
(function init() {
  if (sessionStorage.getItem('bhoomi_admin_auth') === '1') {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    loadData();
    navigate('dashboard');
  } else {
    setTimeout(() => document.getElementById('login-pw').focus(), 100);
  }
})();
</script>
